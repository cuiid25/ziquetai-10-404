<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#171513">
  <meta name="description" content="正荣滨江紫阙台10-404整屋沉浸式家装效果漫游，两套设计方案可选">
  <title>紫阙台10-404 · 整屋沉浸漫游</title>
  <style>
    :root {
      color-scheme: dark;
      font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Microsoft YaHei", sans-serif;
      background: #171513;
      color: #f4eee5;
    }
    * { box-sizing: border-box; }
    html, body { min-height: 100%; margin: 0; }
    body {
      background:
        radial-gradient(circle at 82% 8%, rgba(180, 151, 115, .15), transparent 32%),
        radial-gradient(circle at 10% 82%, rgba(117, 91, 65, .12), transparent 30%),
        #171513;
    }
    main {
      width: min(1240px, calc(100% - 40px));
      margin: 0 auto;
      padding: clamp(42px, 7vw, 88px) 0 64px;
    }
    header {
      display: flex;
      align-items: end;
      justify-content: space-between;
      gap: 28px;
      margin-bottom: 32px;
    }
    .eyebrow {
      display: block;
      margin-bottom: 10px;
      color: rgba(244,238,229,.58);
      font-size: 11px;
      letter-spacing: .22em;
    }
    h1 {
      margin: 0;
      font-size: clamp(32px, 5vw, 64px);
      line-height: 1.04;
      font-weight: 400;
      letter-spacing: -.035em;
    }
    header p {
      max-width: 410px;
      margin: 0;
      color: rgba(244,238,229,.62);
      font-size: 14px;
      line-height: 1.75;
    }
    .versions {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 18px;
    }
    .version {
      position: relative;
      min-height: min(64vh, 680px);
      overflow: hidden;
      border: 1px solid rgba(255,255,255,.13);
      border-radius: 26px;
      background: #211d19;
      color: inherit;
      text-decoration: none;
      isolation: isolate;
      box-shadow: 0 24px 80px rgba(0,0,0,.28);
    }
    .version img {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      transition: transform .75s cubic-bezier(.2,.7,.2,1);
      z-index: -2;
    }
    .version::after {
      content: "";
      position: absolute;
      inset: 0;
      z-index: -1;
      background: linear-gradient(180deg, rgba(8,7,6,.06) 28%, rgba(8,7,6,.87) 100%);
    }
    .version:hover img { transform: scale(1.035); }
    .version:focus-visible { outline: 3px solid #e9d7bd; outline-offset: 4px; }
    .version-content {
      position: absolute;
      inset: auto 0 0;
      padding: clamp(24px, 4vw, 42px);
    }
    .tag {
      display: inline-flex;
      align-items: center;
      min-height: 30px;
      margin-bottom: 15px;
      padding: 0 11px;
      border: 1px solid rgba(255,255,255,.26);
      border-radius: 999px;
      background: rgba(18,15,12,.35);
      font-size: 11px;
      letter-spacing: .08em;
      backdrop-filter: blur(12px);
    }
    h2 {
      margin: 0 0 10px;
      font-size: clamp(25px, 3.4vw, 43px);
      font-weight: 400;
      letter-spacing: -.02em;
    }
    .version p {
      max-width: 530px;
      margin: 0;
      color: rgba(255,255,255,.76);
      font-size: 13px;
      line-height: 1.7;
    }
    .enter {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      margin-top: 19px;
      font-size: 13px;
      letter-spacing: .08em;
    }
    .enter span {
      display: grid;
      place-items: center;
      width: 31px;
      height: 31px;
      border-radius: 50%;
      background: #f4eee5;
      color: #171513;
      font-size: 19px;
    }
    footer {
      margin-top: 20px;
      color: rgba(244,238,229,.48);
      font-size: 11px;
      line-height: 1.65;
    }
    @media (max-width: 760px) {
      main { width: min(100% - 24px, 620px); padding-top: 34px; }
      header { align-items: start; flex-direction: column; margin-bottom: 23px; }
      header p { max-width: 100%; }
      .versions { grid-template-columns: 1fr; }
      .version { min-height: 66vh; border-radius: 20px; }
    }
    @media (prefers-reduced-motion: reduce) {
      .version img { transition: none; }
    }
  </style>
</head>
<body>
  <main>
    <header>
      <div>
        <span class="eyebrow">ZI QUE TAI · 10-404</span>
        <h1>选择整屋设计版本</h1>
      </div>
      <p>两套方案均保留原平面关系与主要通行路线。点击任一版本，可在手机或电脑上逐空间参观。</p>
    </header>

    <section class="versions" aria-label="整屋设计版本">
      <a class="version" href="tour-warm-nordic.html">
        <img src="assets/tour-web/living.jpg" alt="暖木北欧版客厅预览">
        <div class="version-content">
          <span class="tag">A版 · 已保留</span>
          <h2>暖木北欧</h2>
          <p>浅木饰面、奶油织物与低饱和色彩，温暖放松，适合偏自然的居住氛围。</p>
          <span class="enter">进入漫游 <span aria-hidden="true">›</span></span>
        </div>
      </a>

      <a class="version" href="tour-leather-stone.html">
        <img src="assets/tour-leather-stone/living.jpg" alt="皮革石材版客厅预览">
        <div class="version-content">
          <span class="tag">B版 · 新增杂物间</span>
          <h2>皮革石材</h2>
          <p>皮革、大理石、暖灰烤漆与烟熏玻璃为主；新增杂物间视角、1.8米雪茄柜及自动上下水扫地机器人。</p>
          <span class="enter">进入漫游 <span aria-hidden="true">›</span></span>
        </div>
      </a>
    </section>

    <footer>效果图用于空间氛围、材质和家具方向确认；施工尺寸、设备散热、检修、电源及给排水条件仍须按最终产品型号与施工图复核。</footer>
  </main>
</body>
</html>
