<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#b8b15f">
  <title>紫阙台10-404 · C版奶油青柠整屋效果</title>
  <link rel="stylesheet" href="tour-palette.css">
</head>
<body>
  <main class="tour" data-variant="lime" aria-label="紫阙台10-404奶油青柠整屋效果漫游">
    <img class="backdrop" id="backdrop" alt="" aria-hidden="true">
    <img class="scene active" id="scene-a" alt="">
    <img class="scene" id="scene-b" alt="">
    <div class="shade" aria-hidden="true"></div>
    <header class="topbar">
      <div class="brand"><span class="eyebrow">ZI QUE TAI · 10-404</span><strong>C版 · 奶油青柠</strong></div>
      <nav class="actions">
        <a class="pill" href="index.html">切换版本</a>
        <a class="pill" href="ar-tour.html?palette=lime">AR实景</a>
        <button class="pill" id="auto" type="button" aria-pressed="false">自动巡游</button>
        <button class="pill" id="plan-open" type="button">平面图</button>
        <button class="pill" id="fullscreen" type="button">全屏</button>
      </nav>
    </header>
    <section class="copy" aria-live="polite">
      <div class="counter" id="counter"></div>
      <h1 id="scene-title"></h1>
      <p id="scene-description"></p>
      <div class="materials" id="materials"></div>
    </section>
    <button class="icon-button prev" id="prev" type="button" aria-label="上一个空间">‹</button>
    <button class="icon-button next" id="next" type="button" aria-label="下一个空间">›</button>
    <nav class="dock" id="dock" aria-label="房间列表"></nav>
    <div class="progress"><span id="progress"></span></div>
    <aside class="plan" id="plan" aria-label="平面图">
      <div class="plan-card">
        <img src="assets/designer-plan.jpg" alt="紫阙台10-404设计师平面布置图">
        <button class="plan-close" id="plan-close" type="button" aria-label="关闭平面图">×</button>
      </div>
    </aside>
  </main>
  <script src="tour-palette.js"></script>
</body>
</html>
